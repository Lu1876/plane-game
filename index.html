<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞机大战 - Space Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e27;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #gameCanvas {
            border: 2px solid #00ff88;
            box-shadow: 0 0 20px #00ff88, inset 0 0 20px rgba(0, 255, 136, 0.1);
            background: #0a0e27;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .top-ui {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        .score-display, .lives-display {
            color: #00ff88;
            font-size: 24px;
            text-shadow: 0 0 10px #00ff88;
            font-weight: bold;
        }

        .exit-button {
            background: transparent;
            border: 1px solid #ff3040;
            color: #ff3040;
            padding: 5px 15px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 0 10px #ff3040;
            box-shadow: 0 0 10px rgba(255, 48, 64, 0.3);
            pointer-events: auto;
        }

        .exit-button:hover {
            background: #ff3040;
            color: #0a0e27;
            box-shadow: 0 0 20px #ff3040;
        }

        .lives-display {
            color: #ff3040;
            text-shadow: 0 0 10px #ff3040;
        }

        .heart {
            display: inline-block;
            width: 20px;
            height: 20px;
            margin: 0 2px;
        }

        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }

        .hidden {
            display: none !important;
        }

        .game-title {
            font-size: 48px;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            margin-bottom: 30px;
            letter-spacing: 4px;
        }

        .subtitle {
            color: #ffcc00;
            font-size: 18px;
            margin-bottom: 40px;
            text-shadow: 0 0 10px #ffcc00;
        }

        .instructions {
            color: #888;
            font-size: 14px;
            margin-bottom: 40px;
            text-align: center;
            line-height: 2;
        }

        .instructions span {
            color: #00ff88;
        }

        .final-score {
            font-size: 36px;
            color: #ffcc00;
            text-shadow: 0 0 15px #ffcc00;
            margin-bottom: 30px;
        }

        .game-button {
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            padding: 15px 50px;
            font-size: 20px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 0 10px #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
            pointer-events: auto;
        }

        .game-button:hover {
            background: #00ff88;
            color: #0a0e27;
            box-shadow: 0 0 30px #00ff88;
        }

        .game-button:active {
            transform: scale(0.95);
        }

        @media (max-width: 600px) {
            .game-title {
                font-size: 32px;
            }
            
            .score-display, .lives-display {
                font-size: 18px;
            }
            
            .game-button {
                padding: 12px 35px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="ui-overlay">
            <div class="top-ui">
                <div class="lives-display" id="livesDisplay"></div>
                <div class="score-display">分数: <span id="scoreDisplay">0</span></div>
                <button class="exit-button" id="exitButton">退出</button>
            </div>
        </div>
        
        <div class="screen-overlay" id="startScreen">
            <h1 class="game-title">飞机大战</h1>
            <p class="subtitle">SPACE SHOOTER</p>
            <div class="instructions">
                <span>方向键/WASD</span> - 移动飞机<br>
                <span>空格键</span> - 暂停/继续游戏<br>
                <span>触摸屏幕</span> - 移动端控制（自动射击）<br>
                <span>自动射击</span> - 无需手动开火
            </div>
            <button class="game-button" id="startButton">开始游戏</button>
        </div>
        
        <div class="screen-overlay hidden" id="gameOverScreen">
            <h1 class="game-title">游戏结束</h1>
            <p class="final-score">最终分数: <span id="finalScore">0</span></p>
            <div style="display: flex; gap: 20px; margin-top: 20px;">
                <button class="game-button" id="restartButton">重新开始</button>
                <button class="game-button" id="quitButton">退出</button>
            </div>
        </div>
        
        <div class="screen-overlay hidden" id="pauseScreen">
            <h1 class="game-title">游戏暂停</h1>
            <p class="subtitle">按空格键继续游戏</p>
            <div style="display: flex; gap: 20px; margin-top: 40px;">
                <button class="game-button" id="resumeButton">继续游戏</button>
                <button class="game-button" id="restartButton2">重新开始</button>
                <button class="game-button" id="quitButton2">退出</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const CANVAS_WIDTH = 480;
        const CANVAS_HEIGHT = 720;
        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;

        const GameState = {
            START: 'start',
            PLAYING: 'playing',
            PAUSED: 'paused',
            GAMEOVER: 'gameover'
        };

        let gameData = {
            score: 0,
            lives: 3,
            state: GameState.START
        };

        class Player {
            constructor() {
                this.width = 50;
                this.height = 50;
                this.x = CANVAS_WIDTH / 2 - this.width / 2;
                this.y = CANVAS_HEIGHT - this.height - 20;
                this.speed = 6;
                this.bullets = [];
                this.lastShot = 0;
                this.shootDelay = 150;
            }

            update(keys, touchX) {
                if (keys.ArrowLeft || keys.KeyA) this.x -= this.speed;
                if (keys.ArrowRight || keys.KeyD) this.x += this.speed;
                if (keys.ArrowUp || keys.KeyW) this.y -= this.speed;
                if (keys.ArrowDown || keys.KeyS) this.y += this.speed;

                if (touchX !== null) {
                    this.x = touchX - this.width / 2;
                }

                this.x = Math.max(0, Math.min(CANVAS_WIDTH - this.width, this.x));
                this.y = Math.max(0, Math.min(CANVAS_HEIGHT - this.height, this.y));

                // 自动射击
                this.shoot();
            }

            shoot() {
                const now = Date.now();
                if (now - this.lastShot > this.shootDelay) {
                    this.bullets.push(new Bullet(this.x + this.width / 2 - 2, this.y));
                    this.lastShot = now;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 15;
                
                ctx.fillStyle = '#00ff88';
                ctx.beginPath();
                ctx.moveTo(0, -this.height / 2);
                ctx.lineTo(-this.width / 2, this.height / 2);
                ctx.lineTo(-this.width / 4, this.height / 3);
                ctx.lineTo(0, this.height / 2 - 5);
                ctx.lineTo(this.width / 4, this.height / 3);
                ctx.lineTo(this.width / 2, this.height / 2);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#0a0e27';
                ctx.beginPath();
                ctx.arc(0, -5, 10, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#ffcc00';
                ctx.shadowColor = '#ffcc00';
                ctx.beginPath();
                ctx.moveTo(-10, this.height / 3);
                ctx.lineTo(0, this.height / 2 + Math.random() * 10);
                ctx.lineTo(10, this.height / 3);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();

                this.bullets.forEach((bullet, index) => {
                    bullet.update();
                    if (bullet.y < -bullet.height) {
                        this.bullets.splice(index, 1);
                    } else {
                        bullet.draw();
                    }
                });
            }
        }

        class Bullet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 4;
                this.height = 15;
                this.speed = 10;
            }

            update() {
                this.y -= this.speed;
            }

            draw() {
                ctx.save();
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 10;
                ctx.fillStyle = '#00ff88';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.restore();
            }
        }

        class Enemy {
            constructor(type = 1) {
                this.type = type;
                this.width = type === 2 ? 60 : 40;
                this.height = type === 2 ? 50 : 35;
                this.x = Math.random() * (CANVAS_WIDTH - this.width);
                this.y = -this.height;
                this.speed = type === 2 ? 1.5 : 2 + Math.random() * 2;
                this.health = type === 2 ? 3 : 1;
                this.points = type === 2 ? 30 : 10;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.05;
            }

            update() {
                this.y += this.speed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 1.5;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                
                const color = this.type === 2 ? '#ff3040' : '#ff6b6b';
                ctx.shadowColor = color;
                ctx.shadowBlur = 10;
                ctx.fillStyle = color;
                
                if (this.type === 2) {
                    ctx.beginPath();
                    ctx.moveTo(0, this.height / 2);
                    ctx.lineTo(-this.width / 2, -this.height / 2);
                    ctx.lineTo(-this.width / 3, -this.height / 3);
                    ctx.lineTo(0, -this.height / 2 + 5);
                    ctx.lineTo(this.width / 3, -this.height / 3);
                    ctx.lineTo(this.width / 2, -this.height / 2);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(0, this.height / 2);
                    ctx.lineTo(-this.width / 2, -this.height / 2);
                    ctx.lineTo(0, -this.height / 4);
                    ctx.lineTo(this.width / 2, -this.height / 2);
                    ctx.closePath();
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }

        class Explosion {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.particles = [];
                this.life = 30;
                
                for (let i = 0; i < 15; i++) {
                    this.particles.push({
                        x: 0,
                        y: 0,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8,
                        size: Math.random() * 5 + 2,
                        color: Math.random() > 0.5 ? '#ffcc00' : '#ff3040'
                    });
                }
            }

            update() {
                this.life--;
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.size *= 0.95;
                });
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                this.particles.forEach(p => {
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 10;
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = this.life / 30;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.restore();
            }
        }

        class Star {
            constructor() {
                this.reset();
                this.y = Math.random() * CANVAS_HEIGHT;
            }

            reset() {
                this.x = Math.random() * CANVAS_WIDTH;
                this.y = -5;
                this.size = Math.random() * 2 + 1;
                this.speed = Math.random() * 3 + 1;
                this.opacity = Math.random() * 0.5 + 0.3;
            }

            update() {
                this.y += this.speed;
                if (this.y > CANVAS_HEIGHT) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = '#ffffff';
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        let player;
        let enemies = [];
        let explosions = [];
        let stars = [];
        let keys = {};
        let touchX = null;
        let enemySpawnTimer = 0;

        function initGame() {
            player = new Player();
            enemies = [];
            explosions = [];
            stars = [];
            gameData.score = 0;
            gameData.lives = 3;
            enemySpawnTimer = 0;
            
            for (let i = 0; i < 50; i++) {
                stars.push(new Star());
            }
            
            updateUI();
        }

        function updateUI() {
            document.getElementById('scoreDisplay').textContent = gameData.score;
            let heartsHtml = '';
            for (let i = 0; i < gameData.lives; i++) {
                heartsHtml += '❤';
            }
            document.getElementById('livesDisplay').textContent = heartsHtml;
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function spawnEnemies() {
            enemySpawnTimer++;
            const spawnRate = Math.max(30, 60 - Math.floor(gameData.score / 100));
            
            if (enemySpawnTimer >= spawnRate) {
                const type = Math.random() > 0.8 ? 2 : 1;
                enemies.push(new Enemy(type));
                enemySpawnTimer = 0;
            }
        }

        function update() {
            if (gameData.state !== GameState.PLAYING) return;

            stars.forEach(star => star.update());
            player.update(keys, touchX);
            spawnEnemies();

            enemies.forEach((enemy, index) => {
                enemy.update();
                
                player.bullets.forEach((bullet, bulletIndex) => {
                    if (checkCollision(enemy, bullet)) {
                        enemy.health--;
                        player.bullets.splice(bulletIndex, 1);
                        
                        if (enemy.health <= 0) {
                            explosions.push(new Explosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2));
                            gameData.score += enemy.points;
                            enemies.splice(index, 1);
                            updateUI();
                        }
                    }
                });

                if (checkCollision(player, enemy)) {
                    explosions.push(new Explosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2));
                    enemies.splice(index, 1);
                    gameData.lives--;
                    updateUI();
                    
                    if (gameData.lives <= 0) {
                        gameOver();
                    }
                }

                if (enemy.y > CANVAS_HEIGHT) {
                    enemies.splice(index, 1);
                }
            });

            explosions.forEach((explosion, index) => {
                explosion.update();
                if (explosion.life <= 0) {
                    explosions.splice(index, 1);
                }
            });
        }

        function render() {
            ctx.fillStyle = '#0a0e27';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            stars.forEach(star => star.draw());

            if (gameData.state === GameState.PLAYING) {
                player.draw();
                enemies.forEach(enemy => enemy.draw());
                explosions.forEach(explosion => explosion.draw());
            }
        }

        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            gameData.state = GameState.PLAYING;
            document.getElementById('startScreen').classList.add('hidden');
            initGame();
        }

        function gameOver() {
            gameData.state = GameState.GAMEOVER;
            document.getElementById('finalScore').textContent = gameData.score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function restartGame() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('pauseScreen').classList.add('hidden');
            startGame();
        }

        function pauseGame() {
            if (gameData.state === GameState.PLAYING) {
                gameData.state = GameState.PAUSED;
                document.getElementById('pauseScreen').classList.remove('hidden');
            }
        }

        function resumeGame() {
            if (gameData.state === GameState.PAUSED) {
                gameData.state = GameState.PLAYING;
                document.getElementById('pauseScreen').classList.add('hidden');
            }
        }

        function quitGame() {
            gameData.state = GameState.START;
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('pauseScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameData.state === GameState.PLAYING) {
                    pauseGame();
                } else if (gameData.state === GameState.PAUSED) {
                    resumeGame();
                }
            } else {
                keys[e.code] = true;
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            touchX = (e.touches[0].clientX - rect.left) * (CANVAS_WIDTH / rect.width);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            touchX = (e.touches[0].clientX - rect.left) * (CANVAS_WIDTH / rect.width);
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            touchX = null;
        });

        document.getElementById('startButton').addEventListener('click', startGame);
        document.getElementById('restartButton').addEventListener('click', restartGame);
        document.getElementById('restartButton2').addEventListener('click', restartGame);
        document.getElementById('resumeButton').addEventListener('click', resumeGame);
        document.getElementById('quitButton').addEventListener('click', quitGame);
        document.getElementById('quitButton2').addEventListener('click', quitGame);
        document.getElementById('exitButton').addEventListener('click', quitGame);

        initGame();
        gameLoop();
    </script>
</body>
</html>
